{% extends "base.html" %}

{% block content %}
<div class="auth-card">
    <div class="auth-header">
        <h2>Join the Pool</h2>
    </div>
    <div class="auth-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="mb-3">
                <label for="username" class="form-label">
                    Username <small style="color: var(--text-muted); text-transform: none; letter-spacing: 0;">(your leaderboard name)</small>
                </label>
                <input type="text" class="form-control" id="username" name="username"
                       value="{{ request.form.get('username', '') }}" minlength="3" required autofocus>
                <small class="form-text">At least 3 characters</small>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email"
                       value="{{ request.form.get('email', '') }}" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password"
                       minlength="6" required>
                <small class="form-text">At least 6 characters</small>
            </div>

            <div class="mb-3">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirm_password"
                       name="confirm_password" minlength="6" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>

        <div class="mt-3 text-center">
            <span style="color: var(--text-muted);">Already registered?</span>
            <a href="{{ url_for('auth.login') }}">Login here</a>
        </div>
    </div>
</div>
{% endblock %}
